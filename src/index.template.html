  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: start center;
      overflow-x: hidden;
      background: #000;
    }

    body[data-loading="true"] main {
      visibility: hidden;
    }

    #loading-screen {
      position: fixed;
      z-index: 100;
      inset: 0;
      overflow: hidden;
      background: #000;
      contain: strict;
    }

    #loading-screen[hidden] {
      display: none;
    }

    #loading-progress {
      width: 100%;
      height: 100%;
      background: #fff;
      transform: scaleX(0);
      transform-origin: left center;
      will-change: transform;
    }

    #loading-title {
      position: absolute;
      z-index: 1;
      top: calc(clamp(3rem, 10vh, 7rem) + env(safe-area-inset-top, 0px));
      left: 50%;
      width: min(54rem, calc(100% - 2rem));
      margin: 0;
      transform: translateX(-50%);
      color: #000;
      font-size: 11.8vw;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }

    main {
      width: min(54rem, calc(100% - 2rem));
      padding: calc(clamp(3rem, 10vh, 7rem) + env(safe-area-inset-top, 0px)) 1rem clamp(2rem, 6vw, 5rem);
      text-align: center;
    }

    #loading-title {
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      text-wrap: balance;
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: clamp(1.5rem, 4vw, 2.25rem);

    #go {
      min-width: min(19rem, 80vw);
      min-height: 7rem;
      border: 2px solid #fff;
      border-radius: 0.5rem;
      padding: 1rem 2.5rem;
      cursor: pointer;
      color: #000;
      background: #fff;
      font: inherit;
      font-size: clamp(3.25rem, 12vw, 6.75rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1;
      transition: background-color 100ms ease, color 100ms ease;
    }

    #go:hover:not(:disabled) {
      color: #fff;
      background: #000;
    }

    #go:active:not(:disabled) {
      opacity: 0.72;
    }

    #go:focus-visible {
      outline: 0.2rem solid #fff;
      outline-offset: 0.4rem;
    }

    #go:disabled {
      cursor: default;
      color: #000;
      background: #fff;
      opacity: 0.5;
    }

    #go[data-state="running"] {
      color: #fff;
      background: #000;
    }

    #go[data-state="running"]:hover:not(:disabled) {
      color: #000;
      background: #fff;

<body data-loading="true">

    role="progressbar"
    aria-label="Loading"
    aria-valuemin="0"
    aria-valuemax="100"
    aria-valuenow="0"
  ><div id="loading-progress"></div><div id="loading-title" aria-hidden="true">preparing sounds</div></div>
  <main>
    <h1>Chaotic<br>Sound Effects</h1>
    <button id="go" type="button" disabled>GO!</button>
    <div class="bottom-copy">
      <p class="offline-note">This is a <a href="https://www.pcmag.com/explainers/how-to-use-progessive-web-apps" target="_blank" rel="noopener noreferrer">progressive web app</a> and can be used offline. It runs best when installed locally.</p>
      <p>Designed to play forever.</p>
      <p class="store-links"><a href="https://addons.mozilla.org/en-US/firefox/addon/chaotic-sound-effects/" target="_blank" rel="noopener noreferrer">Firefox Add-On</a> / <a href="https://chromewebstore.google.com/detail/mgkfdggkjfeodfdejjodabcohefledcb?utm_source=item-share-cb" target="_blank" rel="noopener noreferrer">Chrome Extension</a></p>
      <p class="app-version" aria-label="Version __APP_VERSION__">__APP_VERSION__</p>
    </div>
  </main>

  <script>
    "use strict";

    // Generated from ./snd. The manifest maps each original MP3 to one byte range
    // in a single content-versioned pack stored locally by the browser.
    const APP_VERSION = "__APP_VERSION__";
    const SHELL_CACHE_NAME = "__SHELL_CACHE_NAME__";
    const VERSION_STORAGE_KEY = "csfx-version";
    const SOUND_FILES = __SOUND_FILES__;
    const SOUND_CACHE_NAME = "__CACHE_NAME__";
    const SOUND_PACK_VERSION = "__SOUND_PACK_VERSION__";
    const SOUND_PACK_SIZE = __SOUND_PACK_SIZE__;
    const SOUND_PACK_URL = new URL(
      `sounds.pack?v=${SOUND_PACK_VERSION}`,
      document.baseURI
    ).href;
    const SOUND_PACK_FILE_NAME = `sounds-${SOUND_PACK_VERSION}.pack`;
    const SOUND_PACK_RETRY_LIMIT = 3;
    const SOUND_PACK_DIRECTORY = "csfx-sound-packs";
    const EXTENSION_RUNTIME = location.protocol === "chrome-extension:"
      || location.protocol === "moz-extension:";
    const SHELL_ASSET_PATHS = [
      "./",
      "./index.html",
      "./manifest.webmanifest",
      "./icon-16.png",
      "./icon-32.png",
      "./icon-192.png",
      "./icon-maskable-192.png",
      "./icon-384.png",
      "./icon-512.png",
      "./icon-maskable-512.png",
      "./icon-1024.png",
      "./apple-touch-icon.png"
    ];
    const PACK_PROGRESS_SHARE = 0.98;
    const CHANNEL_COUNT = 5;
    const MAX_CONCURRENT_DECODES = 1;
    const DECODE_TIMEOUT_MS = 15000;
    const AUDIO_CONTEXT_CLOSE_TIMEOUT_MS = 3000;
    const SERVICE_WORKER_ACTIVATION_TIMEOUT_MS = 15000;
    const RECENT_SOUND_LIMIT = 12;
    const OUTPUT_VOLUME = 0.33;
    const OUTPUT_CEILING = 0.95;
    const LIMITER_KNEE = 0.8;
    const LIMITER_CURVE_SIZE = 2049;
    const DELAY_FEEDBACK = 0.48;
    const DELAY_TAIL_THRESHOLD = 0.001;
    const PAN_MOTION_CHANCE = 0.5;
    const MAX_PAN_SWEEPS = 4;
    const PITCH_MODULATION_CHANCE = 0.5;
    const MIN_PLAYBACK_RATE = 0.5;
    const MAX_PLAYBACK_RATE = 2;
    const PLAYBACK_RATE_SAFETY_MARGIN = 0.001;
    const AUDIO_START_TIMEOUT_MS = 5000;

    const goButton = document.querySelector("#go");
    const loadingScreen = document.querySelector("#loading-screen");
    const loadingProgress = document.querySelector("#loading-progress");
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    const recentSounds = new Array(
      Math.min(RECENT_SOUND_LIMIT, Math.max(0, SOUND_FILES.length - 1))
    );
    const channels = Array.from({ length: CHANNEL_COUNT }, () => {
      return {
        audio: null,
        mediaSource: null,
        source: null,
        panner: null,
        delayNode: null,
        delayWet: null,
        delayFeedback: null,
        pitchOscillator: null,
        pitchGain: null,
        controller: null,
        cancel: null,
        task: null
      };
    });
    const decodeQueue = [];

    let running = false;
    let audioContext = null;
    let outputGain = null;
    let outputLimiter = null;
    let startController = null;
    let errorCount = 0;
    let shutdownPromise = null;
    let recentSoundCount = 0;
    let recentSoundIndex = 0;
    let activeDecodeCount = 0;
    let decodeGeneration = 0;
    let playbackController = null;
    let keepAliveSource = null;
    let keepAliveGain = null;
    let wakeLock = null;
    let cacheWarningLogged = false;
    let soundPackFile = null;
    let soundPackPreloadPromise = null;
    let soundPackPreloadController = null;
    let applicationCachePromise = null;
    let loadingComplete = false;
    let persistentStorageRequested = false;

    function logInfo(message) {
      console.info(`[Chaotic Sound Effects] ${message}`);
    }

    function logWarning(message) {
      console.warn(`[Chaotic Sound Effects] ${message}`);
    }

    function logError(message, error = null) {
      if (error) console.error(`[Chaotic Sound Effects] ${message}`, error);
      else console.error(`[Chaotic Sound Effects] ${message}`);
    }

    function setLoadingProgress(fraction) {
      if (loadingComplete) return;
      const bounded = Math.min(1, Math.max(0, Number(fraction) || 0));
      loadingProgress.style.transform = `scaleX(${bounded})`;
      loadingScreen.setAttribute("aria-valuenow", String(Math.round(bounded * 100)));
    }

    function setSoundPackProgress(loadedBytes) {
      setLoadingProgress((loadedBytes / SOUND_PACK_SIZE) * PACK_PROGRESS_SHARE);
    }

    function finishLoadingScreen() {
      if (loadingComplete) return;
      setLoadingProgress(1);
      loadingComplete = true;
      loadingScreen.hidden = true;
      loadingScreen.setAttribute("aria-hidden", "true");
      loadingProgress.style.willChange = "auto";
      document.body.dataset.loading = "false";
      goButton.disabled = false;
    }

    logInfo(`Version ${APP_VERSION}`);

    function waitForWorkerActivation(worker) {
      if (!worker || worker.state === "activated") return Promise.resolve();
      return new Promise((resolve, reject) => {
        let timeout = null;
        const onStateChange = () => {
          if (worker.state === "activated") finish();
          else if (worker.state === "redundant") {
            finish(new Error("The offline worker could not be installed."));
          }
        };
        const finish = (error = null) => {
          if (timeout !== null) window.clearTimeout(timeout);
          timeout = null;
          worker.removeEventListener("statechange", onStateChange);
          if (error) reject(error);
          else resolve();
        };
        worker.addEventListener("statechange", onStateChange);
        timeout = window.setTimeout(() => {
          finish(new Error("Offline worker activation timed out."));
        }, SERVICE_WORKER_ACTIVATION_TIMEOUT_MS);
        onStateChange();
      });
    }

    async function registerServiceWorker() {
      if (!("serviceWorker" in navigator) || location.protocol === "file:") {
        throw new Error("Service workers are unavailable.");
      }
      try {
        return await navigator.serviceWorker.register("./sw.js", { scope: "./" });
      } catch (error) {
        throw new Error(`Offline support unavailable: ${error.message}`);
      }
    }

    async function offlineShellIsReady() {
      if (!("caches" in window)) return false;
      try {
        const cache = await caches.open(SHELL_CACHE_NAME);
        const matches = await Promise.all(SHELL_ASSET_PATHS.map((path) => (
          cache.match(new URL(path, document.baseURI).href)
        )));
        return matches.every(Boolean);
      } catch {
        return false;
      }
    }

    async function offlineShellCanStart(registration) {
      const workerCanServe = Boolean(
        navigator.serviceWorker.controller
        || registration.active?.state === "activated"
      );
      return workerCanServe && await offlineShellIsReady();
    }

    async function ensureOfflineShell(registration) {
      if (!("caches" in window)) {
        throw new Error("Cache Storage is unavailable.");
      }

      // An older active worker can safely keep serving while a replacement
      // finishes in the background. Do not let that replacement block launch
      // when this version's complete shell is already durable.
      if (await offlineShellCanStart(registration)) return;

      let candidate = registration.installing || registration.waiting;
      if (candidate) await waitForWorkerActivation(candidate);
      if (await offlineShellCanStart(registration)) return;

      await registration.update();
      candidate = registration.installing || registration.waiting;
      if (candidate) await waitForWorkerActivation(candidate);
      if (!(await offlineShellCanStart(registration))) {
        throw new Error("The complete offline app shell is unavailable.");
      }
    }

    function requestPersistentStorage() {
      if (persistentStorageRequested || !navigator.storage?.persist) return;
      persistentStorageRequested = true;
      void Promise.resolve()
        .then(() => navigator.storage.persist())
        .catch(() => {});
    }

    async function initializeApplicationCache() {
      let previousVersion = null;
      try {
        previousVersion = localStorage.getItem(VERSION_STORAGE_KEY);
        localStorage.setItem(VERSION_STORAGE_KEY, APP_VERSION);
      } catch {
        // Storage can be disabled; service-worker versioning still remains active.
      }

      // The Chrome/Firefox package is itself the durable offline shell. Extension
      // pages cannot register an ordinary web service worker, and do not need one.
      if (EXTENSION_RUNTIME) {
        logInfo("Packaged extension shell ready");
        return;
      }

      const registration = await registerServiceWorker();
      if (previousVersion && previousVersion !== APP_VERSION) {
        logInfo(`Version changed from ${previousVersion} to ${APP_VERSION}; refreshing app shell`);
        try {
          await registration.update();
        } catch (error) {
          logWarning(`App update check failed: ${error.message}`);
        }
      }
      await ensureOfflineShell(registration);
    }

    const ignoredMediaAction = () => {};
    function ignoreMediaButtons() {
      if (!("mediaSession" in navigator)) return;
      const actions = [
        "play", "pause", "stop", "seekbackward", "seekforward", "seekto",
        "previoustrack", "nexttrack", "skipad", "togglemicrophone",
        "togglecamera", "hangup"
      ];
      for (const action of actions) {
        try {
          navigator.mediaSession.setActionHandler(action, ignoredMediaAction);
        } catch {
          // Unsupported actions differ between browser versions.
        }
      }
      try {
        navigator.mediaSession.playbackState = "none";
      } catch {
        // Some implementations expose Media Session without playbackState.
      }
    }

    function wasRecentlyPlayed(sound) {
      for (let index = 0; index < recentSoundCount; index += 1) {
        if (recentSounds[index] === sound) return true;
      }
      return false;
    }

    function chooseSound() {
      if (SOUND_FILES.length === 1) return SOUND_FILES[0];

      let index = Math.floor(Math.random() * SOUND_FILES.length);
      let sound = SOUND_FILES[index];
      while (wasRecentlyPlayed(sound)) {
        index = (index + 1) % SOUND_FILES.length;
        sound = SOUND_FILES[index];
      }

      if (recentSounds.length) {
        recentSounds[recentSoundIndex] = sound;
        recentSoundIndex = (recentSoundIndex + 1) % recentSounds.length;
        if (recentSoundCount < recentSounds.length) recentSoundCount += 1;
      }

      return sound;
    }

    function waitForAbortable(promise, signal) {
      return new Promise((resolve, reject) => {
        let settled = false;
        let activeSignal = signal;

        const finish = (method, value) => {
          if (settled) return;
          settled = true;
          if (activeSignal) {
            activeSignal.removeEventListener("abort", onAbort);
            activeSignal = null;
          }
          method(value);
        };
        const onAbort = () => finish(reject, abortError());

        if (signal.aborted) {
          onAbort();
          return;
        }

        signal.addEventListener("abort", onAbort, { once: true });
        Promise.resolve(promise).then(
          (value) => finish(resolve, value),
          (error) => finish(reject, error)
        );
      });
    }

    function decodeTimeoutError() {
      const error = new Error("Audio decoding timed out.");
      error.name = "DecodeTimeoutError";
      return error;
    }

    function settleDecodeEntry(entry, method, value) {
      if (entry.settled) return;
      entry.settled = true;
      if (entry.timer !== null) window.clearTimeout(entry.timer);
      entry.timer = null;
      entry.signal.removeEventListener("abort", entry.onAbort);
      entry.encodedAudio = null;
      entry.context = null;
      entry.signal = null;
      entry.onAbort = null;
      entry.resolve = null;
      entry.reject = null;
      method(value);
    }

    function pumpDecodeQueue() {
      while (activeDecodeCount < MAX_CONCURRENT_DECODES && decodeQueue.length) {
        const entry = decodeQueue.shift();
        if (entry.signal.aborted || entry.generation !== decodeGeneration) {
          entry.context = null;
          settleDecodeEntry(entry, entry.reject, abortError());
          continue;
        }

        entry.started = true;
        activeDecodeCount += 1;
        const encodedAudio = entry.encodedAudio;
        const context = entry.context;
        entry.encodedAudio = null;
        entry.context = null;
        entry.timer = window.setTimeout(() => {
          settleDecodeEntry(entry, entry.reject, decodeTimeoutError());
        }, DECODE_TIMEOUT_MS);
        Promise.resolve()
          .then(() => context.decodeAudioData(encodedAudio))
          .then(
            (decodedAudio) => settleDecodeEntry(entry, entry.resolve, decodedAudio),
            (error) => settleDecodeEntry(entry, entry.reject, error)
          )
          .finally(() => {
            if (entry.generation === decodeGeneration) {
              activeDecodeCount = Math.max(0, activeDecodeCount - 1);
              pumpDecodeQueue();
            }
          });
      }
    }

    function decodeAudioLimited(encodedAudio, signal) {
      return new Promise((resolve, reject) => {
        if (signal.aborted) {
          reject(abortError());
          return;
        }

        const context = audioContext;
        if (!context) {
          reject(abortError());
          return;
        }

        const entry = {
          encodedAudio,
          context,
          signal,
          resolve,
          reject,
          generation: decodeGeneration,
          started: false,
          settled: false,
          timer: null,
          onAbort: null
        };
        entry.onAbort = () => {
          if (!entry.started) {
            const index = decodeQueue.indexOf(entry);
            if (index !== -1) decodeQueue.splice(index, 1);
            entry.context = null;
          }
          settleDecodeEntry(entry, reject, abortError());
          if (!entry.started) pumpDecodeQueue();
        };
        signal.addEventListener("abort", entry.onAbort, { once: true });
        decodeQueue.push(entry);
        pumpDecodeQueue();
      });
    }

    function resetDecodeScheduler() {
      decodeGeneration += 1;
      activeDecodeCount = 0;
      for (const entry of decodeQueue.splice(0)) {
        entry.context = null;
        settleDecodeEntry(entry, entry.reject, abortError());
      }
    }

    function settleWithin(promise, timeoutMilliseconds) {
      return new Promise((resolve) => {
        let settled = false;
        let timer = null;
        const finish = (completed) => {
          if (settled) return;
          settled = true;
          if (timer !== null) window.clearTimeout(timer);
          timer = null;
          resolve(completed);
        };
        timer = window.setTimeout(() => finish(false), timeoutMilliseconds);
        Promise.resolve(promise).then(
          () => finish(true),
          () => finish(true)
        );
      });
    }

    function warnCacheUnavailable(error) {
      if (cacheWarningLogged) return;
      cacheWarningLogged = true;
      logWarning(`Sound cache unavailable: ${error.message}`);
    }

    async function openSoundCache() {
      if (!("caches" in window)) return null;
      try {
        return await caches.open(SOUND_CACHE_NAME);
      } catch (error) {
        warnCacheUnavailable(error);
        return null;
      }
    }

    function reportUnreadableSound() {
      errorCount += 1;
      logWarning(`${errorCount} unreadable sound${errorCount === 1 ? "" : "s"} skipped`);
    }

    function soundPackResponseHasExpectedSize(response) {
      const encoding = response.headers.get("Content-Encoding");
      if (encoding && encoding.toLowerCase() !== "identity") return true;
      const header = response.headers.get("Content-Length");
      if (header === null) return true;
      return Number(header) === SOUND_PACK_SIZE;
    }

    async function getSoundPackDirectory(create) {
      if (!navigator.storage?.getDirectory) return null;
      try {
        const root = await navigator.storage.getDirectory();
        return await root.getDirectoryHandle(SOUND_PACK_DIRECTORY, { create });
      } catch (error) {
        if (create) warnCacheUnavailable(error);
        return null;
      }
    }

    async function getOpfsSoundPack() {
      const directory = await getSoundPackDirectory(false);
      if (!directory) return null;
      try {
        const handle = await directory.getFileHandle(SOUND_PACK_FILE_NAME);
        const file = await handle.getFile();
        if (file.size === SOUND_PACK_SIZE) return file;
        await directory.removeEntry(SOUND_PACK_FILE_NAME);
      } catch (error) {
        if (error.name !== "NotFoundError") warnCacheUnavailable(error);
      }
      return null;
    }

    async function removeObsoleteOpfsPacks(directory) {
      if (typeof directory.entries !== "function") return;
      try {
        for await (const [name, handle] of directory.entries()) {
          if (handle.kind === "file"
              && name.startsWith("sounds-")
              && name.endsWith(".pack")
              && name !== SOUND_PACK_FILE_NAME) {
            await directory.removeEntry(name);
          }
        }
      } catch {
        // Old packs are harmless if this browser does not support enumeration.
      }
    }

    function monitorSoundPackResponse(response) {
      if (!response.body) return response;
      const reader = response.body.getReader();
      let loadedBytes = 0;
      let readerReleased = false;
      const releaseReader = () => {
        if (readerReleased) return;
        readerReleased = true;
        try { reader.releaseLock(); } catch {}
      };
      const body = new ReadableStream({
        async pull(controller) {
          try {
            const result = await reader.read();
            if (result.done) {
              if (loadedBytes !== SOUND_PACK_SIZE) {
                controller.error(new Error(
                  `Sound pack ended at ${loadedBytes} bytes; expected ${SOUND_PACK_SIZE}.`
                ));
              } else {
                controller.close();
              }
              releaseReader();
              return;
            }
            loadedBytes += result.value.byteLength;
            if (loadedBytes > SOUND_PACK_SIZE) {
              await reader.cancel("Sound pack exceeded its expected size.");
              releaseReader();
              controller.error(new Error("Sound pack exceeded its expected size."));
              return;
            }
            setSoundPackProgress(loadedBytes);
            controller.enqueue(result.value);
          } catch (error) {
            releaseReader();
            controller.error(error);
          }
        },
        async cancel(reason) {
          try { await reader.cancel(reason); } finally { releaseReader(); }
        }
      });
      return new Response(body, {
        status: response.status,
        statusText: response.statusText,
        headers: response.headers
      });
    }

    async function writeSoundPackToOpfs(response, directory, signal) {
      let writable = null;
      try {
        const handle = await directory.getFileHandle(SOUND_PACK_FILE_NAME, { create: true });
        writable = await handle.createWritable();
        if (response.body) {
          const monitored = monitorSoundPackResponse(response);
          await monitored.body.pipeTo(writable, { signal });
          writable = null;
        } else {
          const bytes = await waitForAbortable(response.arrayBuffer(), signal);
          if (bytes.byteLength !== SOUND_PACK_SIZE) {
            throw new Error("Sound pack had an unexpected size.");
          }
          await waitForAbortable(writable.write(bytes), signal);
          await waitForAbortable(writable.close(), signal);
          writable = null;
          setSoundPackProgress(bytes.byteLength);
        }

        const file = await handle.getFile();
        if (file.size !== SOUND_PACK_SIZE) {
          throw new Error(`Sound pack size was ${file.size}; expected ${SOUND_PACK_SIZE}.`);
        }
        await removeObsoleteOpfsPacks(directory);
        return;
      } catch (error) {
        if (writable) {
          try { await writable.abort(); } catch {}
        }
        try { await directory.removeEntry(SOUND_PACK_FILE_NAME); } catch {}
        if (signal.aborted) throw abortError();
        throw error;
      }
    }

    async function getCachedSoundPackResponse() {
      const cache = await openSoundCache();
      if (!cache) return null;
      try {
        const response = await cache.match(SOUND_PACK_URL);
        if (!response) return null;
        if (soundPackResponseHasExpectedSize(response)) return response;
        await cache.delete(SOUND_PACK_URL);
      } catch (error) {
        warnCacheUnavailable(error);
      }
      return null;
    }

    async function fetchSoundPack(signal) {
      const requestOptions = {
        signal,
        cache: "reload"
      };
      if (!EXTENSION_RUNTIME) {
        requestOptions.headers = { "X-CSFX-Pack": "1" };
      }
      const response = await fetch(SOUND_PACK_URL, requestOptions);
      if (!response.ok) {
        throw new Error(`Sound-pack request failed with status ${response.status}.`);
      }
      if (!soundPackResponseHasExpectedSize(response)) {
        throw new Error("Sound-pack response had an unexpected size.");
      }
      return response;
    }

    async function writeSoundPackToCache(response, cache, signal) {
      const monitored = monitorSoundPackResponse(response);
      await cache.put(SOUND_PACK_URL, monitored);
      if (signal.aborted) throw abortError();
      const stored = await cache.match(SOUND_PACK_URL);
      if (!stored || !soundPackResponseHasExpectedSize(stored)) {
        try { await cache.delete(SOUND_PACK_URL); } catch {}
        throw new Error("The cached sound pack could not be verified.");
      }
    }

    async function storeSoundPack(signal) {
      if (await getOpfsSoundPack()) {
        setSoundPackProgress(SOUND_PACK_SIZE);
        return;
      }
      if (await getCachedSoundPackResponse()) {
        setSoundPackProgress(SOUND_PACK_SIZE);
        return;
      }

      let directory = await getSoundPackDirectory(true);
      const cache = await openSoundCache();
      if (!directory && !cache) {
        throw new Error("Persistent sound storage is unavailable.");
      }

      let lastError = null;
      for (let attempt = 0; attempt <= SOUND_PACK_RETRY_LIMIT; attempt += 1) {
        try {
          setSoundPackProgress(0);
          const response = await fetchSoundPack(signal);
          if (directory) {
            try {
              await writeSoundPackToOpfs(response, directory, signal);
              if (cache) {
                try { await cache.delete(SOUND_PACK_URL); } catch {}
              }
              return;
            } catch (error) {
              if (signal.aborted || error.name === "AbortError") throw abortError();
              if (cache) {
                directory = null;
                logWarning("OPFS sound storage failed; using Cache Storage");
              }
              throw error;
            }
          }

          await writeSoundPackToCache(response, cache, signal);
          return;
        } catch (error) {
          if (signal.aborted || error.name === "AbortError") throw abortError();
          lastError = error;
          if (attempt < SOUND_PACK_RETRY_LIMIT) {
            logWarning(`Sound-pack load failed; retry ${attempt + 1} of ${SOUND_PACK_RETRY_LIMIT}`);
          }
        }
      }
      throw lastError || new Error("Sound-pack loading failed.");
    }

    function preloadSoundPack() {
      if (soundPackPreloadPromise) return soundPackPreloadPromise;
      const controller = new AbortController();
      soundPackPreloadController = controller;
      logInfo(`Preloading ${Math.round(SOUND_PACK_SIZE / 1048576)} MiB sound pack`);
      let task = null;
      task = storeSoundPack(controller.signal).then(
        () => logInfo("Sound pack ready"),
        (error) => {
          if (error.name !== "AbortError") logWarning(`Sound-pack preload failed: ${error.message}`);
          if (soundPackPreloadPromise === task) soundPackPreloadPromise = null;
          throw error;
        }
      ).finally(() => {
        if (soundPackPreloadController === controller) soundPackPreloadController = null;
      });
      soundPackPreloadPromise = task;
      void task.catch(() => {});
      return task;
    }

    async function getStoredSoundPackSource(signal) {
      const opfsFile = await waitForAbortable(getOpfsSoundPack(), signal);
      if (opfsFile) return opfsFile;

      const response = await waitForAbortable(getCachedSoundPackResponse(), signal);
      if (response) {
        const blob = await waitForAbortable(response.blob(), signal);
        if (blob.size === SOUND_PACK_SIZE) return blob;
      }
      return null;
    }

    async function acquireSoundPack(signal) {
      if (soundPackFile) return soundPackFile;
      if (soundPackPreloadPromise) {
        try {
          await waitForAbortable(soundPackPreloadPromise, signal);
        } catch (error) {
          if (signal.aborted) throw abortError();
        }
      }

      let source = await getStoredSoundPackSource(signal);
      if (!source) {
        await storeSoundPack(signal);
        source = await getStoredSoundPackSource(signal);
      }
      if (!source || source.size !== SOUND_PACK_SIZE) {
        throw new Error("The complete sound pack is unavailable.");
      }
      soundPackFile = source;
      return source;
    }

    function getSoundSlice(sound) {
      const end = sound.o + sound.l;
      if (!soundPackFile
          || !Number.isSafeInteger(sound.o)
          || !Number.isSafeInteger(sound.l)
          || sound.o < 0
          || sound.l <= 0
          || end > soundPackFile.size) {
        throw new Error("Sound-pack index entry is invalid.");
      }
      return soundPackFile.slice(sound.o, end, "audio/mpeg");
    }

    function yieldBeforePlaybackRetry(channel, signal) {
      return new Promise((resolve, reject) => {
        let settled = false;
        let timer = window.setTimeout(() => finish(), 0);
        const onAbort = () => finish(abortError());
        const cancel = onAbort;
        const finish = (error) => {
          if (settled) return;
          settled = true;
          if (timer !== null) window.clearTimeout(timer);
          timer = null;
          signal.removeEventListener("abort", onAbort);
          if (channel.cancel === cancel) channel.cancel = null;
          if (error) reject(error);
          else resolve();
        };
        channel.cancel = cancel;
        signal.addEventListener("abort", onAbort, { once: true });
      });
    }

    function choosePan() {
      return (Math.random() * 2) - 1;
    }

    function choosePlaybackRate() {
      if (Math.random() >= 0.5) return 1;
      return Math.random() < 0.5
        ? 0.5 + (Math.random() * 0.5)
        : 1 + Math.random();
    }

    function choosePitchModulation(playbackRate) {
      if (Math.random() >= PITCH_MODULATION_CHANCE) {
        return { playbackRate, pitch: null };
      }

      const depth = 0.04 + (Math.random() * 0.12);
      const safePlaybackRate = Math.min(
        MAX_PLAYBACK_RATE - depth - PLAYBACK_RATE_SAFETY_MARGIN,
        Math.max(
          MIN_PLAYBACK_RATE + depth + PLAYBACK_RATE_SAFETY_MARGIN,
          playbackRate
        )
      );

      return {
        playbackRate: safePlaybackRate,
        pitch: {
          depth,
          frequency: 0.18 + (Math.random() * 0.47)
        }
      };
    }

    function chooseDelay() {
      return Math.random() < 0.5
        ? 0.08 + (Math.random() * 0.52)
        : 0;
    }

    function scheduleRandomPanMotion(panner, initialPan, durationSeconds, enabled) {
      if (!Number.isFinite(durationSeconds)
          || durationSeconds < 0.12
          || !enabled) {
        return null;
      }

      const parameter = panner.pan;
      const startTime = audioContext.currentTime;
      const endTime = startTime + durationSeconds;
      const possibleSweeps = Math.min(
        MAX_PAN_SWEEPS,
        Math.max(1, Math.floor(durationSeconds / 0.12))
      );
      const sweepCount = 1 + Math.floor(Math.random() * possibleSweeps);
      let cursor = startTime;
      let currentPan = initialPan;

      parameter.setValueAtTime(initialPan, startTime);

      for (let index = 0; index < sweepCount; index += 1) {
        const remaining = endTime - cursor;
        if (remaining <= 0.06) break;

        const maximumHold = Math.min(1.25, (remaining - 0.06) * 0.75);
        cursor += Math.random() * Math.max(0, maximumHold);

        const availableSweepTime = endTime - cursor;
        const minimumSweep = Math.min(0.06, availableSweepTime);
        const maximumSweep = Math.min(1.5, availableSweepTime);
        const sweepDuration = minimumSweep
          + (Math.random() * (maximumSweep - minimumSweep));
        const nextPan = choosePan();

        parameter.setValueAtTime(currentPan, cursor);
        cursor += sweepDuration;
        parameter.linearRampToValueAtTime(nextPan, cursor);
        currentPan = nextPan;
      }
    }

    function schedulePitchWindows(parameter, durationSeconds, depth) {
      if (!Number.isFinite(durationSeconds) || durationSeconds < 0.25) return null;

      const startTime = audioContext.currentTime;
      const endTime = startTime + durationSeconds;
      const possibleWindows = Math.min(
        3,
        Math.max(1, Math.floor(durationSeconds / 0.8))
      );
      const requestedWindows = 1 + Math.floor(Math.random() * possibleWindows);
      let cursor = startTime;
      let count = 0;
      let shortestWindow = Infinity;
      let longestWindow = 0;

      parameter.setValueAtTime(0, startTime);

      for (let index = 0; index < requestedWindows; index += 1) {
        const remaining = endTime - cursor;
        if (remaining < 0.25) break;

        const hold = Math.random() * Math.min(1.25, remaining * 0.35);
        cursor += hold;
        const available = endTime - cursor;
        if (available < 0.2) break;

        const windowDuration = Math.min(
          available,
          0.4 + (Math.random() * 1.8)
        );
        const attack = windowDuration * (0.2 + (Math.random() * 0.2));
        const release = windowDuration * (0.2 + (Math.random() * 0.2));
        const sustainEnd = cursor + windowDuration - release;

        parameter.setValueAtTime(0, cursor);
        parameter.linearRampToValueAtTime(depth, cursor + attack);
        parameter.setValueAtTime(depth, sustainEnd);
        parameter.linearRampToValueAtTime(0, cursor + windowDuration);

        cursor += windowDuration;
        count += 1;
        shortestWindow = Math.min(shortestWindow, windowDuration);
        longestWindow = Math.max(longestWindow, windowDuration);
      }

      return count ? { count, shortestWindow, longestWindow, endTime: cursor } : null;
    }

    function getDelayRepeats() {
      return Math.ceil(
        Math.log(DELAY_TAIL_THRESHOLD) / Math.log(DELAY_FEEDBACK)
      );
    }

    function getDelayTailMilliseconds(delaySeconds) {
      if (!delaySeconds) return 0;
      return Math.ceil(delaySeconds * getDelayRepeats() * 1000);
    }

    function abortError() {
      return new DOMException("Playback stopped", "AbortError");
    }

    function startSilentLooper(context) {
      const source = context.createBufferSource();
      const gain = context.createGain();
      try {
        source.buffer = context.createBuffer(1, 1, context.sampleRate || 44100);
        source.loop = true;
        gain.gain.value = 0;
        source.connect(gain);
        gain.connect(context.destination);
        source.start(0);
        keepAliveSource = source;
        keepAliveGain = gain;
      } catch (error) {
        try {
          source.stop();
        } catch {
          // The source may not have started.
        }
        disconnectNode(source);
        disconnectNode(gain);
        source.buffer = null;
        throw error;
      }
    }

    function stopSilentLooper() {
      const source = keepAliveSource;
      const gain = keepAliveGain;
      keepAliveSource = null;
      keepAliveGain = null;
      if (source) {
        try {
          source.stop();
        } catch {
          // The context may already have stopped the source.
        }
        disconnectNode(source);
        source.buffer = null;
      }
      disconnectNode(gain);
    }

    function resumePlaybackContext() {
      const context = audioContext;
      if (!running || !context || context.state !== "suspended") return;
      void Promise.resolve(context.resume()).catch(() => {});
    }

    async function requestScreenWakeLock() {
      if (!running
          || wakeLock
          || document.visibilityState === "hidden"
          || !("wakeLock" in navigator)) {
        return;
      }
      try {
        const lock = await navigator.wakeLock.request("screen");
        if (!running) {
          await lock.release();
          return;
        }
        wakeLock = lock;
        lock.addEventListener("release", () => {
          if (wakeLock === lock) wakeLock = null;
        }, { once: true });
      } catch {
        // Wake Lock is optional and is commonly denied in background tabs.
      }
    }

    async function releaseScreenWakeLock() {
      const lock = wakeLock;
      wakeLock = null;
      if (!lock) return;
      try {
        await lock.release();
      } catch {
        // It may already have been released by the browser.
      }
    }

    function waitForAudioStart(context, signal) {
      return new Promise((resolve, reject) => {
        let settled = false;
        const timeout = window.setTimeout(() => {
          finish(new Error("Audio startup timed out."));
        }, AUDIO_START_TIMEOUT_MS);

        const onAbort = () => finish(abortError());
        const finish = (error) => {
          if (settled) return;
          settled = true;
          window.clearTimeout(timeout);
          signal.removeEventListener("abort", onAbort);
          if (error) reject(error);
          else resolve();
        };

        signal.addEventListener("abort", onAbort, { once: true });
        Promise.resolve()
          .then(() => context.resume())
          .then(() => finish(), finish);
      });
    }

    function disconnectNode(node) {
      if (!node) return;
      try {
        node.disconnect();
      } catch {
        // A partially constructed graph may already be disconnected.
      }
    }

    function createLimiterCurve() {
      const curve = new Float32Array(LIMITER_CURVE_SIZE);
      const kneeSpan = 1 - LIMITER_KNEE;

      for (let index = 0; index < curve.length; index += 1) {
        const input = ((index / (curve.length - 1)) * 2) - 1;
        const magnitude = Math.abs(input);
        if (magnitude <= LIMITER_KNEE) {
          curve[index] = input;
          continue;
        }

        const position = (magnitude - LIMITER_KNEE) / kneeSpan;
        const positionSquared = position * position;
        const positionCubed = positionSquared * position;
        const startWeight = (2 * positionCubed) - (3 * positionSquared) + 1;
        const slopeWeight = positionCubed - (2 * positionSquared) + position;
        const endWeight = (-2 * positionCubed) + (3 * positionSquared);
        const limitedMagnitude =
          (startWeight * LIMITER_KNEE)
          + (slopeWeight * kneeSpan)
          + (endWeight * OUTPUT_CEILING);
        curve[index] = Math.sign(input) * limitedMagnitude;
      }

      return curve;
    }

    function releasePanner(channel, panner) {
      if (!panner) return;
      try {
        panner.pan.cancelScheduledValues(0);
      } catch {
        // The context may already be closing.
      }
      disconnectNode(panner);
      if (channel.panner === panner) channel.panner = null;
    }

    function createPitchRoute(channel, source, pitch, durationSeconds) {
      if (!pitch) return { route: null, motion: null };

      const gain = audioContext.createGain();
      let oscillator = null;

      try {
        gain.gain.value = 0;
        const motion = schedulePitchWindows(gain.gain, durationSeconds, pitch.depth);
        if (!motion) {
          try {
            gain.gain.cancelScheduledValues(0);
          } catch {
            // The context may already be closing.
          }
          disconnectNode(gain);
          return { route: null, motion: null };
        }

        oscillator = audioContext.createOscillator();
        channel.pitchOscillator = oscillator;
        channel.pitchGain = gain;
        oscillator.type = "sine";
        oscillator.frequency.value = pitch.frequency;
        oscillator.connect(gain);
        gain.connect(source.playbackRate);
        oscillator.start();
        oscillator.stop(motion.endTime);

        return {
          route: { oscillator, gain, released: false },
          motion
        };
      } catch (error) {
        try {
          gain.gain.cancelScheduledValues(0);
        } catch {
          // The context may already be closing.
        }
        if (oscillator) {
          try {
            oscillator.stop();
          } catch {
            // It may not have started before construction failed.
          }
          disconnectNode(oscillator);
        }
        disconnectNode(gain);
        if (channel.pitchOscillator === oscillator) channel.pitchOscillator = null;
        if (channel.pitchGain === gain) channel.pitchGain = null;
        throw error;
      }
    }

    function releasePitchRoute(channel, route) {
      if (!route || route.released) return;
      route.released = true;
      try {
        route.gain.gain.cancelScheduledValues(0);
      } catch {
        // The context may already be closing.
      }
      try {
        route.oscillator.stop();
      } catch {
        // The oscillator may already have been stopped during teardown.
      }
      disconnectNode(route.oscillator);
      disconnectNode(route.gain);
      if (channel.pitchOscillator === route.oscillator) channel.pitchOscillator = null;
      if (channel.pitchGain === route.gain) channel.pitchGain = null;
    }

    function createDelayRoute(channel, panner, delaySeconds) {
      if (!delaySeconds) {
        panner.connect(outputGain);
        return null;
      }

      // A bounded feedback trail reuses one sub-second DelayNode buffer. It does
      // not allocate a new audio buffer for each repeat.
      let delayNode = null;
      let delayWet = null;
      let delayFeedback = null;

      try {
        delayNode = audioContext.createDelay(delaySeconds + 0.01);
        channel.delayNode = delayNode;
        delayWet = audioContext.createGain();
        channel.delayWet = delayWet;
        delayFeedback = audioContext.createGain();
        channel.delayFeedback = delayFeedback;
        delayNode.delayTime.value = delaySeconds;
        delayWet.gain.value = 0.55;
        delayFeedback.gain.value = DELAY_FEEDBACK;
        panner.connect(outputGain);
        panner.connect(delayNode);
        delayNode.connect(delayWet);
        delayWet.connect(outputGain);
        delayNode.connect(delayFeedback);
        delayFeedback.connect(delayNode);
        return { delayNode, delayWet, delayFeedback };
      } catch (error) {
        disconnectNode(delayNode);
        disconnectNode(delayWet);
        disconnectNode(delayFeedback);
        if (channel.delayNode === delayNode) channel.delayNode = null;
        if (channel.delayWet === delayWet) channel.delayWet = null;
        if (channel.delayFeedback === delayFeedback) channel.delayFeedback = null;
        throw error;
      }
    }

    function releaseDelayRoute(channel, route) {
      if (!route) return;
      disconnectNode(route.delayNode);
      disconnectNode(route.delayWet);
      disconnectNode(route.delayFeedback);
      if (channel.delayNode === route.delayNode) channel.delayNode = null;
      if (channel.delayWet === route.delayWet) channel.delayWet = null;
      if (channel.delayFeedback === route.delayFeedback) channel.delayFeedback = null;
    }

    function resetNativeSource(channel, audio, mediaSource, panner) {
      if (mediaSource) {
        disconnectNode(mediaSource);
      }
      releasePanner(channel, panner);
      if (audio) {
        try {
          audio.pause();
          audio.removeAttribute("src");
          audio.load();
        } catch {
          // Dropping all application references still permits browser cleanup.
        }
      }
    }

    function getNativePool(channel) {
      if (channel.audio && channel.mediaSource) {
        return { audio: channel.audio, mediaSource: channel.mediaSource };
      }

      const audio = new Audio();
      audio.preload = "none";
      audio.volume = 1;
      const mediaSource = audioContext.createMediaElementSource(audio);
      channel.audio = audio;
      channel.mediaSource = mediaSource;
      return { audio, mediaSource };
    }

    function releaseNativePool(channel) {
      const audio = channel.audio;
      const mediaSource = channel.mediaSource;
      channel.audio = null;
      channel.mediaSource = null;
      resetNativeSource(channel, audio, mediaSource, channel.panner);
    }

    function playNative(channel, soundBlob, playbackRate, delaySeconds, pan, panMoves) {
      // Forward playback stays on the browser's native media pipeline, which can
      // use the operating system's accelerated decoder without allocating PCM in JS.
      return new Promise((resolve, reject) => {
        let audio = null;
        let mediaSource = null;
        let panner = null;
        let delayRoute = null;
        let tailTimer = null;
        let sourceReleased = false;
        let settled = false;
        let cancel = null;
        let objectUrl = null;

        const releaseSourceOnly = () => {
          if (sourceReleased) return;
          sourceReleased = true;
          if (audio) {
            audio.removeEventListener("ended", onEnded);
            audio.removeEventListener("error", onError);
            audio.removeEventListener("loadedmetadata", onMetadata);
          }
          resetNativeSource(channel, audio, mediaSource, panner);
          if (objectUrl) {
            URL.revokeObjectURL(objectUrl);
            objectUrl = null;
          }
        };

        const cleanup = () => {
          if (cancel && channel.cancel === cancel) {
            channel.cancel = null;
          }
          if (tailTimer !== null) window.clearTimeout(tailTimer);
          tailTimer = null;
          releaseSourceOnly();
          releaseDelayRoute(channel, delayRoute);
        };

        const finish = (error) => {
          if (settled) return;
          settled = true;
          cleanup();
          if (error) reject(error);
          else resolve();
        };

        const onEnded = () => {
          if (!delaySeconds) {
            finish();
            return;
          }
          // Once the dry source ends, drop the media element and decoder state;
          // only the small bounded DelayNode buffer remains for the final tap.
          releaseSourceOnly();
          tailTimer = window.setTimeout(() => {
            tailTimer = null;
            finish();
          }, getDelayTailMilliseconds(delaySeconds));
        };
        const onMetadata = () => {
          const remainingDuration = (audio.duration - audio.currentTime) / playbackRate;
          scheduleRandomPanMotion(
            panner,
            pan,
            remainingDuration,
            panMoves
          );
        };
        const onError = () => finish(new Error("The browser could not play this sound."));
        cancel = () => finish(abortError());
        channel.cancel = cancel;

        try {
          const pool = getNativePool(channel);
          audio = pool.audio;
          mediaSource = pool.mediaSource;
          panner = audioContext.createStereoPanner();
          channel.panner = panner;
          delayRoute = createDelayRoute(channel, panner, delaySeconds);
          panner.pan.value = pan;
          mediaSource.connect(panner);
          audio.playbackRate = playbackRate;
          audio.preservesPitch = false;
          audio.addEventListener("ended", onEnded, { once: true });
          audio.addEventListener("error", onError, { once: true });
          audio.addEventListener("loadedmetadata", onMetadata, { once: true });
          objectUrl = URL.createObjectURL(soundBlob);
          soundBlob = null;
          audio.src = objectUrl;
          Promise.resolve(audio.play()).catch(onError);
        } catch (error) {
          finish(error);
        }
      });
    }

    async function playBuffered(
      channel,
      soundBlob,
      reversed,
      playbackRate,
      pitch,
      delaySeconds,
      pan,
      panMoves
    ) {
      // Reverse and oscillator-pitch playback require a decoded source. Only this
      // clip is decoded, optionally reversed in place, then completely released.
      const controller = new AbortController();
      let encodedAudio = null;
      let decodedAudio = null;
      let source = null;
      let panner = null;
      let pitchRoute = null;
      let delayRoute = null;
      let stopPlayback = null;
      let tailTimer = null;
      let sourceReleased = false;

      channel.controller = controller;
      channel.cancel = () => {
        controller.abort();
        if (stopPlayback) stopPlayback();
      };

      try {
        const encodedAudioTask = soundBlob.arrayBuffer();
        soundBlob = null;
        encodedAudio = await waitForAbortable(encodedAudioTask, controller.signal);
        if (controller.signal.aborted) throw abortError();
        const decodeTask = decodeAudioLimited(encodedAudio, controller.signal);
        encodedAudio = null;
        decodedAudio = await decodeTask;

        if (controller.signal.aborted) throw abortError();

        if (reversed) {
          for (let index = 0; index < decodedAudio.numberOfChannels; index += 1) {
            decodedAudio.getChannelData(index).reverse();
          }
        }

        source = audioContext.createBufferSource();
        panner = audioContext.createStereoPanner();
        source.buffer = decodedAudio;
        source.playbackRate.value = playbackRate;
        const estimatedDuration = decodedAudio.duration / playbackRate;
        pitchRoute = createPitchRoute(
          channel,
          source,
          pitch,
          estimatedDuration
        ).route;
        panner.pan.value = pan;
        scheduleRandomPanMotion(
          panner,
          pan,
          estimatedDuration,
          panMoves
        );
        source.connect(panner);
        delayRoute = createDelayRoute(channel, panner, delaySeconds);
        channel.source = source;
        channel.panner = panner;

        await new Promise((resolve, reject) => {
          let settled = false;

          const finish = (error) => {
            if (settled) return;
            settled = true;
            source.removeEventListener("ended", onEnded);
            if (tailTimer !== null) window.clearTimeout(tailTimer);
            tailTimer = null;
            stopPlayback = null;
            if (error) reject(error);
            else resolve();
          };

          const onEnded = () => {
            // The source buffer is the largest per-clip allocation. It is no longer
            // needed once the source ends, even while a short delay tap drains.
            sourceReleased = true;
            releasePitchRoute(channel, pitchRoute);
            disconnectNode(source);
            source.buffer = null;
            if (channel.source === source) channel.source = null;
            releasePanner(channel, panner);
            decodedAudio = null;
            if (!delaySeconds) {
              finish();
              return;
            }
            tailTimer = window.setTimeout(() => {
              tailTimer = null;
              finish();
            }, getDelayTailMilliseconds(delaySeconds));
          };
          stopPlayback = () => {
            try {
              source.stop();
            } catch {
              // It may already have ended; cleanup below is still safe.
            }
            finish(abortError());
          };

          source.addEventListener("ended", onEnded, { once: true });
          source.start(0);
        });
      } finally {
        controller.abort();

        if (source && !sourceReleased) {
          try {
            source.stop();
          } catch {
            // A one-shot source cannot be stopped twice.
          }
          disconnectNode(source);
          source.buffer = null;
        }
        if (tailTimer !== null) window.clearTimeout(tailTimer);
        tailTimer = null;
        releasePitchRoute(channel, pitchRoute);
        releaseDelayRoute(channel, delayRoute);
        releasePanner(channel, panner);

        if (channel.source === source) channel.source = null;
        if (channel.controller === controller) channel.controller = null;
        channel.cancel = null;
        stopPlayback = null;
        pitchRoute = null;
        delayRoute = null;
        panner = null;
        source = null;
        decodedAudio = null;
        encodedAudio = null;
        soundBlob = null;
      }
    }

    async function runChannel(channel, signal) {
      while (running && !signal.aborted) {
        const sound = chooseSound();
        let soundBlob = null;
        try {
          soundBlob = getSoundSlice(sound);
        } catch (error) {
          if (!running || error.name === "AbortError") break;
          reportUnreadableSound();
          continue;
        }

        // Every choice is independent. A clip can be reversed, speed-shifted,
        // pitch-modulated, delayed, positioned, and moving all at once.
        const reversed = Math.random() < 0.5;
        const pitchChoice = choosePitchModulation(choosePlaybackRate());
        const playbackRate = pitchChoice.playbackRate;
        const pitch = pitchChoice.pitch;
        const delaySeconds = chooseDelay();
        const pan = choosePan();
        const panMoves = Math.random() < PAN_MOTION_CHANCE;

        try {
          let playbackTask = null;
          if (reversed || pitch) {
            playbackTask = playBuffered(
              channel,
              soundBlob,
              reversed,
              playbackRate,
              pitch,
              delaySeconds,
              pan,
              panMoves
            );
          } else {
            playbackTask = playNative(
              channel,
              soundBlob,
              playbackRate,
              delaySeconds,
              pan,
              panMoves
            );
          }
          soundBlob = null;
          await playbackTask;
        } catch (error) {
          if (error.name === "DecodeTimeoutError") {
            if (running) void stopAfterDecodeTimeout(error);
            break;
          }
          if (!running || error.name === "AbortError") break;
          reportUnreadableSound();
          try {
            await yieldBeforePlaybackRetry(channel, signal);
          } catch (retryError) {
            if (!running || retryError.name === "AbortError") break;
            throw retryError;
          }
        } finally {
          soundBlob = null;
        }
      }
    }

    async function stopAfterDecodeTimeout(error) {
      if (!running) return;
      goButton.disabled = true;
      await shutdown();
      resetInterface();
      logError("Playback stopped because the browser audio decoder did not respond.", error);
    }

    function releaseChannel(channel) {
      if (channel.cancel) {
        channel.cancel();
        return;
      }

      if (channel.controller) channel.controller.abort();
      if (channel.audio) releaseNativePool(channel);
      if (channel.source) {
        try {
          channel.source.stop();
        } catch {
          // The source may already have ended.
        }
        disconnectNode(channel.source);
        channel.source.buffer = null;
        channel.source = null;
      }
      if (channel.mediaSource) {
        disconnectNode(channel.mediaSource);
        channel.mediaSource = null;
      }
      if (channel.pitchOscillator && channel.pitchGain) {
        releasePitchRoute(channel, {
          oscillator: channel.pitchOscillator,
          gain: channel.pitchGain,
          released: false
        });
      }
      if (channel.delayNode && channel.delayWet && channel.delayFeedback) {
        releaseDelayRoute(channel, {
          delayNode: channel.delayNode,
          delayWet: channel.delayWet,
          delayFeedback: channel.delayFeedback
        });
      }
      releasePanner(channel, channel.panner);
    }

    function resetInterface() {
      goButton.disabled = !loadingComplete;
      goButton.textContent = "GO!";
      goButton.dataset.state = "idle";
    }

    async function shutdown() {
      if (shutdownPromise) return shutdownPromise;

      shutdownPromise = (async () => {
        running = false;
        if (startController) startController.abort();
        if (playbackController) playbackController.abort();
        channels.forEach(releaseChannel);

        // Detach the graph before waiting for channel tasks. In particular, an
        // active decode cannot be cancelled by Web Audio, so its application
        // promise is aborted and its context is closed without waiting for it.
        stopSilentLooper();
        const context = audioContext;
        audioContext = null;
        disconnectNode(outputGain);
        outputGain = null;
        if (outputLimiter) {
          try {
            outputLimiter.curve = null;
          } catch {
            // Closing the context still releases the node's internal curve.
          }
          disconnectNode(outputLimiter);
          outputLimiter = null;
        }
        resetDecodeScheduler();

        let contextClosePromise = Promise.resolve();
        if (context && context.state !== "closed") {
          context.onstatechange = null;
          try {
            contextClosePromise = Promise.resolve(context.close()).catch(() => {});
          } catch {
            // Dropping every application reference is the remaining fallback.
          }
        }

        // Do not permit a fresh session to reuse channel state until every old
        // async load/decode has reached its finally block and dropped references.
        await Promise.allSettled(
          channels.map((channel) => channel.task).filter(Boolean)
        );
        channels.forEach((channel) => {
          channel.task = null;
          releaseNativePool(channel);
        });
        playbackController = null;
        soundPackFile = null;
        await releaseScreenWakeLock();

        if (!(await settleWithin(contextClosePromise, AUDIO_CONTEXT_CLOSE_TIMEOUT_MS))) {
          logWarning("Audio context cleanup continued beyond the shutdown deadline.");
        }
      })();

      try {
        await shutdownPromise;
      } finally {
        shutdownPromise = null;
      }
    }

    async function start() {
      if (running) return;
      if (shutdownPromise) await shutdownPromise;

      if (location.protocol === "file:") {
        logError("Open this folder through a local web server so reversed sounds can be loaded.");
        return;
      }

      if (!SOUND_FILES.length) {
        logError("No sounds were found in the snd folder.");
        return;
      }

      if (!AudioContextClass) {
        logError("This browser does not support reversed Web Audio playback.");
        return;
      }

      const controller = new AbortController();
      const sessionController = new AbortController();
      startController = controller;
      playbackController = sessionController;
      goButton.disabled = false;
      goButton.textContent = "STOP";
      goButton.dataset.state = "running";
      logInfo("Starting playback");
      errorCount = 0;
      running = true;

      try {
        await acquireSoundPack(controller.signal);
        if (controller.signal.aborted || !running) throw abortError();

        const context = new AudioContextClass({ latencyHint: "playback" });
        audioContext = context;
        if (typeof context.createStereoPanner !== "function") {
          throw new Error("Stereo panning is not supported.");
        }

        outputGain = context.createGain();
        outputGain.gain.value = OUTPUT_VOLUME;
        outputLimiter = context.createWaveShaper();
        outputLimiter.curve = createLimiterCurve();
        outputLimiter.oversample = "none";
        outputGain.connect(outputLimiter);
        outputLimiter.connect(context.destination);
        await waitForAudioStart(context, controller.signal);
        if (controller.signal.aborted || !running || audioContext !== context) {
          throw abortError();
        }

        startSilentLooper(context);
        context.onstatechange = resumePlaybackContext;
        void requestScreenWakeLock();
        requestPersistentStorage();

        channels.forEach((channel) => {
          channel.task = runChannel(channel, sessionController.signal);
        });
      } catch (error) {
        if (error.name === "AbortError") return;
        await shutdown();
        resetInterface();
        logError("This browser could not start stereo audio playback.", error);
      } finally {
        if (startController === controller) startController = null;
      }
    }

    async function stop() {
      if (!running) return;
      goButton.disabled = true;
      await shutdown();
      resetInterface();
      logInfo("Playback stopped");
    }

    function prepareApplicationCache() {
      if (applicationCachePromise) return applicationCachePromise;
      let task = null;
      task = initializeApplicationCache().catch((error) => {
        if (applicationCachePromise === task) applicationCachePromise = null;
        throw error;
      });
      applicationCachePromise = task;
      return task;
    }

    async function initializeOfflineApplication() {
      if (loadingComplete) return;
      try {
        await Promise.all([prepareApplicationCache(), preloadSoundPack()]);
        finishLoadingScreen();
        requestPersistentStorage();
      } catch (error) {
        if (error.name !== "AbortError") {
          logError("Offline loading did not complete; waiting to retry.", error);
        }
      }
    }

    goButton.addEventListener("click", () => {
      if (running) void stop();
      else void start();
    });
    ignoreMediaButtons();
    void initializeOfflineApplication();
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "visible") return;
      resumePlaybackContext();
      void requestScreenWakeLock();
    });
    window.addEventListener("focus", resumePlaybackContext);
    window.addEventListener("online", () => {
      if (!loadingComplete) void initializeOfflineApplication();
    });
    window.addEventListener("pagehide", () => {
      if (soundPackPreloadController) soundPackPreloadController.abort();
      void shutdown();
    });
    window.addEventListener("pageshow", (event) => {
      if (event.persisted) {
        resetInterface();
        if (!loadingComplete) void initializeOfflineApplication();
      }
    });
  </script>
</body>
</html>
